name: CF优选IP

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test IPs
        run: |
          # 备用IP池
          IPs=(
            1.1.1.1 1.0.0.1
            104.16.132.229 104.16.133.229
            104.18.0.1 104.18.1.1
            172.64.0.1 172.64.1.1
            104.21.0.1 104.21.1.1
          )
          
          results=""
          for ip in "${IPs[@]}"; do
            time=$(ping -c 2 -W 1 $ip 2>/dev/null | tail -1 | awk -F'/' '{print $5}')
            if [ -n "$time" ]; then
              results+="$time $ip\n"
            fi
          done
          
          echo -e "$results" | sort -n | head -5 > best_ips.txt
          cat best_ips.txt

      - name: Generate Multi Nodes
        run: |
          nodes=""
          n=1
          while read line; do
            ip=$(echo $line | awk '{print $2}')
            if [ -n "$ip" ]; then
              cfg="{\"add\":\"$ip\",\"aid\":\"0\",\"host\":\"why2583.xyz\",\"id\":\"4dac7bd2-1777-4696-83a5-bb6c26813c8f\",\"net\":\"ws\",\"path\":\"/ws\",\"port\":\"443\",\"ps\":\"CF-$n\",\"tls\":\"tls\",\"type\":\"none\",\"v\":\"2\"}"
              nodes+="vmess://$(echo -n "$cfg" | base64 -w0)\n"
              ((n++))
            fi
          done < best_ips.txt
          echo -e "$nodes" > subscribe.txt
          cat subscribe.txt

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update"
          file_pattern: subscribe.txt
