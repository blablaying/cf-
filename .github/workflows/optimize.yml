name: CF优选IP

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test CF IPs
        run: |
          > results.txt
          for ip in 1.1.1.1 1.0.0.1 104.16.132.229 104.16.133.229 104.18.0.1 104.18.1.1 172.64.0.1 172.64.1.1 104.21.0.1 104.21.1.1; do
            t=$(ping -c 2 -W 2 $ip 2>/dev/null | tail -1 | awk -F'/' '{print $5}')
            [ -n "$t" ] && echo "$t $ip" >> results.txt
          done
          sort -n results.txt | head -5 > best.txt
          cat best.txt

      - name: Generate VMess Subscribe
        run: |
          : > subscribe.txt
          n=1
          while read t ip; do
            [ -z "$ip" ] && continue
            uuid="4dac7bd2-1777-4696-83a5-bb6c26813c8f"
            host="proxy.why2583.xyz"
            cfg="{\"v\":\"2\",\"ps\":\"CF-$n\",\"add\":\"$ip\",\"port\":\"443\",\"id\":\"$uuid\",\"aid\":\"0\",\"net\":\"tcp\",\"type\":\"none\",\"host\":\"$host\",\"path\":\"\",\"tls\":\"tls\",\"sni\":\"$host\"}"
            echo "vmess://$(echo -n "$cfg" | base64 -w0)" >> subscribe.txt
            ((n++))
          done < best.txt
          
          if [ ! -s subscribe.txt ]; then
            host="proxy.why2583.xyz"
            cfg="{\"v\":\"2\",\"ps\":\"CF-1\",\"add\":\"1.1.1.1\",\"port\":\"443\",\"id\":\"4dac7bd2-1777-4696-83a5-bb6c26813c8f\",\"aid\":\"0\",\"net\":\"tcp\",\"type\":\"none\",\"host\":\"$host\",\"path\":\"\",\"tls\":\"tls\",\"sni\":\"$host\"}"
            echo "vmess://$(echo -n "$cfg" | base64 -w0)" >> subscribe.txt
          fi
          cat subscribe.txt

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update"
          file_pattern: subscribe.txt
