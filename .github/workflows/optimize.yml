name: CF优选IP

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          curl -sL https://github.com/XIU2/CloudflareSpeedTest/releases/latest/download/CloudflareSpeedTest_linux_amd64.tar.gz | tar xz
          chmod +x CloudflareSpeedTest
          file CloudflareSpeedTest

      - name: Test
        run: |
          ./CloudflareSpeedTest -n 10 2>&1 | tee result.txt

      - name: Build
        run: |
          ip=$(grep -oP '^\d+\.\d+\.\d+\.\d+' result.txt | head -1)
          [ -z "$ip" ] && ip="1.1.1.1"
          echo "IP=$ip"
          cfg="{\"add\":\"$ip\",\"aid\":\"0\",\"host\":\"why2583.xyz\",\"id\":\"4dac7bd2-1777-4696-83a5-bb6c26813c8f\",\"net\":\"ws\",\"path\":\"/ws\",\"port\":\"443\",\"ps\":\"CF\",\"tls\":\"tls\",\"type\":\"none\",\"v\":\"2\"}"
          echo "vmess://$(echo -n "$cfg" | base64 -w0)" > subscribe.txt
          cat subscribe.txt

      - name: Save
        run: |
          git config user.name "bot"
          git config user.email "a@b.com"
          git add -A
          git diff --cached --quiet || git commit -m "update"
          git push
