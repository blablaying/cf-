name: CF优选IP

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test IPs
        run: |
          ips="1.1.1.1 1.0.0.1 104.16.132.229 104.16.133.229"
          best_ip="1.1.1.1"
          best_time=9999
          for ip in $ips; do
            time=$(ping -c 3 -W 2 $ip 2>/dev/null | tail -1 | awk -F'/' '{print $5}')
            if [ -n "$time" ]; then
              echo "$ip: ${time}ms"
              if (( $(echo "$time < $best_time" | bc -l) )); then
                best_time=$time
                best_ip=$ip
              fi
            fi
          done
          echo "BEST_IP=$best_ip" >> $GITHUB_ENV
          echo "Best: $best_ip"

      - name: Generate
        run: |
          ip="${{ env.BEST_IP }}"
          cfg="{\"add\":\"$ip\",\"aid\":\"0\",\"host\":\"why2583.xyz\",\"id\":\"4dac7bd2-1777-4696-83a5-bb6c26813c8f\",\"net\":\"ws\",\"path\":\"/ws\",\"port\":\"443\",\"ps\":\"CF\",\"tls\":\"tls\",\"type\":\"none\",\"v\":\"2\"}"
          echo "vmess://$(echo -n "$cfg" | base64 -w0)" > subscribe.txt
          cat subscribe.txt

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update ${{ env.BEST_IP }}"
          file_pattern: subscribe.txt
