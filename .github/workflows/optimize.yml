name: CF优选IP

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download
        run: |
          curl -sL -o cf.tar.gz "https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareSpeedTest_linux_amd64.tar.gz"
          ls -la cf.tar.gz
          tar -tzf cf.tar.gz
          tar -xzf cf.tar.gz
          ls -la

      - name: Run
        run: |
          ls -la CloudflareSpeedTest || echo "NOT FOUND"
          chmod +x CloudflareSpeedTest 2>/dev/null || true
          ./CloudflareSpeedTest -n 5 || echo "FAILED"

      - name: Parse
        run: |
          ip=$(grep -oP '^\d+\.\d+\.\d+\.\d+' result.txt | head -1)
          echo "IP=$ip"
          echo "BEST_IP=$ip" >> $GITHUB_ENV

      - name: Gen
        run: |
          ip="${BEST_IP:-1.1.1.1}"
          cfg="{\"add\":\"$ip\",\"aid\":\"0\",\"host\":\"why2583.xyz\",\"id\":\"4dac7bd2-1777-4696-83a5-bb6c26813c8f\",\"net\":\"ws\",\"path\":\"/ws\",\"port\":\"443\",\"ps\":\"CF\",\"tls\":\"tls\",\"type\":\"none\",\"v\":\"2\"}"
          echo "vmess://$(echo -n "$cfg" | base64 -w0)" > subscribe.txt
          cat subscribe.txt

      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "a@b.com"
          git add -A
          git commit -m "update" || true
          git push
