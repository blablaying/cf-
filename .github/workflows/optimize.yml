name: CF优选IP

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test IPs
        run: |
          > results.txt
          for ip in 1.1.1.1 1.0.0.1 104.16.132.229 104.16.133.229 104.18.0.1 172.64.0.1; do
            t=$(ping -c 2 -W 2 $ip 2>/dev/null | tail -1 | awk -F'/' '{print $5}')
            [ -n "$t" ] && echo "$t $ip" >> results.txt
          done
          sort -n results.txt | head -5 > best.txt
          cat best.txt

      - name: Generate VLESS Subscribe
        run: |
          : > subscribe.txt
          n=1
          while read t ip; do
            [ -z "$ip" ] && continue
            uuid="4dac7bd2-1777-4696-83a5-bb6c26813c8f"
            node="vless://${uuid}@${ip}:443?encryption=none&security=tls&sni=why2583.xyz&fp=chrome&type=ws&host=why2583.xyz&path=%2F%3Fed%3D2048#CF-${n}"
            echo "$node" >> subscribe.txt
            ((n++))
          done < best.txt
          
          if [ ! -s subscribe.txt ]; then
            echo "vless://4dac7bd2-1777-4696-83a5-bb6c26813c8f@1.1.1.1:443?encryption=none&security=tls&sni=why2583.xyz&fp=chrome&type=ws&host=why2583.xyz&path=%2F%3Fed%3D2048#CF-1" >> subscribe.txt
          fi
          cat subscribe.txt

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update"
          file_pattern: subscribe.txt
