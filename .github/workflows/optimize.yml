name: CF优选IP

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test IPs
        run: |
          # 测试多个IP
          echo "Testing IPs..."
          > results.txt
          for ip in 1.1.1.1 1.0.0.1 104.16.132.229 104.16.133.229 104.18.0.1 172.64.0.1; do
            t=$(ping -c 2 -W 2 $ip 2>/dev/null | tail -1 | awk -F'/' '{print $5}')
            echo "$ip: ${t:-timeout}ms"
            [ -n "$t" ] && echo "$t $ip" >> results.txt
          done
          
          # 取前3个最快IP
          sort -n results.txt | head -3 > best.txt
          cat best.txt || echo "No results"

      - name: Generate Subscribe
        run: |
          # 生成订阅文件
          : > subscribe.txt
          n=1
          
          # 如果有测试结果就用，否则用默认IP
          if [ -s best.txt ]; then
            while read t ip; do
              [ -z "$ip" ] && continue
              echo "Adding $ip"
              node="{\"v\":\"2\",\"ps\":\"CF-$n\",\"add\":\"$ip\",\"port\":\"443\",\"id\":\"4dac7bd2-1777-4696-83a5-bb6c26813c8f\",\"aid\":\"0\",\"net\":\"ws\",\"type\":\"none\",\"host\":\"why2583.xyz\",\"path\":\"/ws\",\"tls\":\"tls\"}"
              echo -n "$node" | base64 | tr -d '\n' | sed 's/^/vmess:\/\//' >> subscribe.txt
              echo "" >> subscribe.txt
              ((n++))
            done < best.txt
          else
            # 默认节点
            for ip in 1.1.1.1 1.0.0.1; do
              node="{\"v\":\"2\",\"ps\":\"CF-$n\",\"add\":\"$ip\",\"port\":\"443\",\"id\":\"4dac7bd2-1777-4696-83a5-bb6c26813c8f\",\"aid\":\"0\",\"net\":\"ws\",\"type\":\"none\",\"host\":\"why2583.xyz\",\"path\":\"/ws\",\"tls\":\"tls\"}"
              echo -n "$node" | base64 | tr -d '\n' | sed 's/^/vmess:\/\//' >> subscribe.txt
              echo "" >> subscribe.txt
              ((n++))
            done
          fi
          
          echo "=== subscribe.txt ==="
          cat subscribe.txt
          echo "====================="

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto update"
          file_pattern: subscribe.txt
