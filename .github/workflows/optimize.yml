name: CF优选IP

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CloudflareSpeedTest
        run: |
          wget https://github.com/XIU2/CloudflareSpeedTest/releases/latest/download/CloudflareSpeedTest_linux_amd64.tar.gz
          tar -xzf CloudflareSpeedTest_linux_amd64.tar.gz
          chmod +x CloudflareSpeedTest

      - name: Run Speed Test
        run: ./CloudflareSpeedTest -n 200 -t 4 -tl 200 -sl 1 -p 0 > result.txt

      - name: Get Best IP
        run: |
          best_ip=$(sed -n '2p' result.txt | awk '{print $1}')
          echo "BEST_IP=$best_ip" >> $GITHUB_ENV
          echo "Best IP: $best_ip"

      - name: Generate Config
        run: |
          vmess_config="{\"v\":\"2\",\"ps\":\"CF-Auto\",\"add\":\"${BEST_IP}\",\"port\":\"443\",\"id\":\"4dac7bd2-1777-4696-83a5-bb6c26813c8f\",\"aid\":\"0\",\"net\":\"ws\",\"type\":\"none\",\"host\":\"proxy.why2583.xyz\",\"path\":\"/ws\",\"tls\":\"tls\"}"
          encoded=$(echo -n "$vmess_config" | base64 -w 0)
          echo "vmess://${encoded}" > subscribe.txt
          echo "Generated subscription"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add subscribe.txt
          git diff --staged --quiet || git commit -m "Update IP: ${BEST_IP}"
          git push
