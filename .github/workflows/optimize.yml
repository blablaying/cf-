name: CF优选IP

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test IPs
        run: |
          IPs="1.1.1.1 1.0.0.1 104.16.132.229 104.16.133.229 104.18.0.1 104.18.1.1 172.64.0.1 172.64.1.1 104.21.0.1 104.21.1.1"
          results=""
          for ip in $IPs; do
            t=$(ping -c 2 -W 1 $ip 2>/dev/null | tail -1 | awk -F'/' '{print $5}')
            [ -n "$t" ] && results+="$t $ip\n"
          done
          echo -e "$results" | sort -n | head -5 > best.txt
          cat best.txt

      - name: Generate
        run: |
          n=1
          > subscribe.txt
          while read line; do
            ip=$(echo $line | awk '{print $2}')
            [ -z "$ip" ] && continue
            cfg="{\"add\":\"$ip\",\"aid\":\"0\",\"host\":\"why2583.xyz\",\"id\":\"4dac7bd2-1777-4696-83a5-bb6c26813c8f\",\"net\":\"ws\",\"path\":\"/ws\",\"port\":\"443\",\"ps\":\"CF-$n\",\"tls\":\"tls\",\"type\":\"none\",\"v\":\"2\"}"
            echo -n "$cfg" | base64 -w0 | sed 's/^/vmess:\/\//' >> subscribe.txt
            echo "" >> subscribe.txt
            ((n++))
          done < best.txt
          cat subscribe.txt

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update"
          file_pattern: subscribe.txt
