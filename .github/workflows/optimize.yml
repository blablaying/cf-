name: CF优选IP

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Tool
        run: |
          wget -O cf.tar.gz https://github.com/XIU2/CloudflareSpeedTest/releases/latest/download/CloudflareSpeedTest_linux_amd64.tar.gz
          tar -xzf cf.tar.gz
          ls -la
          chmod +x CloudflareSpeedTest

      - name: Test
        run: |
          ./CloudflareSpeedTest -n 50 -t 4 -tl 300 -sl 1 -p 0 2>&1 | tee result.txt || true

      - name: Parse
        run: |
          if [ -f result.txt ]; then
            ip=$(grep -oP '\d+\.\d+\.\d+\.\d+' result.txt | head -1)
            echo "BEST_IP=$ip" >> $GITHUB_ENV
            echo "IP: $ip"
          fi

      - name: Generate
        run: |
          if [ -n "$BEST_IP" ]; then
            cfg="{\"v\":\"2\",\"ps\":\"CF\",\"add\":\"${BEST_IP}\",\"port\":\"443\",\"id\":\"4dac7bd2-1777-4696-83a5-bb6c26813c8f\",\"aid\":\"0\",\"net\":\"ws\",\"host\":\"why2583.xyz\",\"path\":\"/ws\",\"tls\":\"tls\"}"
            echo "vmess://$(echo -n "$cfg" | base64 -w 0)" > subscribe.txt
          else
            echo "No IP found" > subscribe.txt
          fi

      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add subscribe.txt
          git commit -m "update" || true
          git push || true
