name: CF优选IP

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test and Generate
        run: |
          uuid="4dac7bd2-1777-4696-83a5-bb6c26813c8f"
          host="proxy.why2583.xyz"
          
          echo "Testing IPs..."
          > results.txt
          
          for ip in 1.1.1.1 1.0.0.1 104.16.132.229 104.16.133.229 104.18.0.1; do
            if timeout 2 bash -c "echo >/dev/tcp/$ip/443" 2>/dev/null; then
              echo "ok $ip" >> results.txt
            fi
          done
          
          > subscribe.txt
          n=1
          while read ok ip; do
            [ -z "$ip" ] && continue
            echo "vless://${uuid}@${ip}:443?encryption=none&security=tls&sni=${host}&type=ws&host=${host}&path=%2F#CF-${n}" >> subscribe.txt
            n=$((n+1))
          done < results.txt
          
          [ ! -s subscribe.txt ] && echo "vless://${uuid}@1.1.1.1:443?encryption=none&security=tls&sni=${host}&type=ws&host=${host}&path=%2F#CF-1" >> subscribe.txt
          
          cat subscribe.txt

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update"
          file_pattern: subscribe.txt
